{% extends "base.html" %}
{% block title %}Anmelden – Badminton Club{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4 text-center"><i class="bi bi-box-arrow-in-right"></i> Anmelden</h3>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger">Benutzername oder Passwort ungültig.</div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Benutzername</label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-semibold">Passwort</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100">Anmelden</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="{% url 'accounts:password_reset' %}" class="text-muted small">Passwort vergessen?</a>
                </div>
                <div class="text-center mt-2">
                    <a href="{% url 'accounts:register' %}">Noch kein Konto? Registrieren</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
