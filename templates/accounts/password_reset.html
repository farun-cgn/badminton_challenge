{% extends "base.html" %}
{% block title %}Passwort zurücksetzen – Badminton Club{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title mb-3"><i class="bi bi-key-fill"></i> Passwort zurücksetzen</h4>
                <p class="text-muted">Gib deine E-Mail-Adresse ein. Du erhältst einen Link zum Zurücksetzen deines Passworts.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">E-Mail-Adresse</label>
                        <input type="email" name="email" id="id_email" class="form-control" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Reset-Link senden</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'accounts:login' %}" class="text-muted small">Zurück zur Anmeldung</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
